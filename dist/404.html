<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leilao Copart</title>
  </head>
  <body>
    <script>
      // GitHub Pages does not support SPA routes. Redirect to /?/<path>
      // and let index.html restore the route via history.replaceState.
      (function () {
        var path = window.location.pathname.replace(/^\//, "");
        var search = window.location.search ? window.location.search.replace(/^\?/, "&") : "";
        var hash = window.location.hash || "";
        window.location.replace(window.location.origin + "/?/" + path + search + hash);
      })();
    </script>
  </body>
</html>
